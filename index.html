        .checkbox-item input[type="checkbox"]::before { content: ""; width: 10px; height: 10px; transform: scale(0); box-shadow: inset 1em 1em white; transform-origin: center; clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%); transition: 120ms transform ease-in-out; }

    'mok20': ['Ročni pihalnik', 'Dvižna košara', 'Motorna žaga', 'Motorne škarje', 'Višinski obrezovalnik', 'Mlin za veje', 'Traktor s prikolico'],
    'mok21': ['Ročni pihalnik', 'Dvižna košara', 'Motorna žaga', 'Motorne škarje', 'Mlin za veje', 'Traktor s prikolico'],
    'mok22': ['Ročni pihalnik', 'Dvižna košara', 'Motorna žaga', 'Motorne škarje', 'Mlin za veje', 'Traktor s prikolico'],
    'mok23': ['Ročni pihalnik', 'Mini bager', 'Traktor s prikolico'], 'mok24': ['Ročni pihalnik', 'Motorna freza', 'Freza za štore'],
    'mok25': ['Ročni pihalnik', 'Traktor s prikolico'], 'mok26': ['Ročni pihalnik', 'Dvižna košara', 'Višinski obrezovalnik'],
    'mok27': ['Ročni pihalnik', 'Motorni pihalnik', 'Sesalec listja', 'Traktor s prikolico'],
    'mok28': ['Ročni pihalnik', 'Motorni pihalnik', 'Sesalec listja', 'Traktor s prikolico'],
    'mok29': ['Ročni pihalnik', 'Komunalna kosilnica', 'Samohodna kosilnica', 'Motorna kosa', 'Traktor s prikolico'],
    'mok30': ['Ročni pihalnik', 'Traktor s prikolico', 'Odvoz odpadkov'], 'mok32': ['Ročni pihalnik', 'El. orodje', 'Agregat'],
    'mok34': ['Ročni pihalnik'], 'mok35': ['Ročni pihalnik', 'Sesalec listja', 'Traktor s prikolico'],
    'mok36': ['Ročni pihalnik', 'Viličar', 'Mini bager', 'Traktor s prikolico']
};

// --- POMOŽNE KOMPONENTE ---
const TimeInput = ({ ure, minute, onChangeUre, onChangeMinute, hasError }) => (
    <div className="time-wrapper" style={hasError ? {borderColor: 'var(--danger)', background: 'var(--danger-light)'} : {}}>
        <input type="number" min="0" max="24" placeholder="h" value={ure} onChange={(e) => onChangeUre(e.target.value)} />
        <span>:</span>
        <input type="number" min="0" max="59" step="5" placeholder="min" value={minute} onChange={(e) => onChangeMinute(e.target.value)} />
    </div>
);

const MultiSelectDropdown = ({ title, options, selectedData, onToggle, hasError }) => {
    const [isOpen, setIsOpen] = useState(false);
    const dropdownRef = useRef(null);

    useEffect(() => {
        const handleClick = (e) => {
            if (dropdownRef.current && !dropdownRef.current.contains(e.target)) setIsOpen(false);
        };
        document.addEventListener('mousedown', handleClick);
        return () => document.removeEventListener('mousedown', handleClick);
    }, []);

    const count = Object.keys(selectedData).length;

    return (
        <div className="dropdown-container" ref={dropdownRef}>
            <div className={`dropdown-btn ${hasError ? 'error' : ''}`} onClick={() => setIsOpen(!isOpen)}>
                <span>{title} {count > 0 && <span style={{background:'var(--primary)', color:'white', padding:'2px 8px', borderRadius:'10px', fontSize:'0.8rem', marginLeft:'8px'}}>{count} izbrano</span>}</span>
                <span style={{fontSize: '0.8rem', transform: isOpen ? 'rotate(180deg)' : 'none', transition: '0.2s'}}>▼</span>
            </div>
            {isOpen && (
                <div className="dropdown-panel">
                    {options.map(opt => (
                        <label key={opt} className="checkbox-item">
                            <input type="checkbox" checked={!!selectedData[opt]} onChange={() => onToggle(opt)} />
                            <span style={{fontWeight: 500}}>{opt}</span>
                        </label>
                    ))}
                </div>
            )}
        </div>
    );
};

// --- INITIAL STATE ---
const INITIAL_STATE = {
    narocnik: 'Mestna Občina Kranj', narocnikDrugo: '', datum: '',
    storitev: '', storitevDrugo: '',
    storitevVisine: Array(4).fill().map(() => ({ selected: false, kolicina: '' })),
    storitevParki: [], storitevPasjiKosi: [], storitevKolicina: '', 
    obmocjeKoncano: Array(5).fill().map(() => ({ obmocje: '', drugo: '' })),
    obmocjeNedokoncano: Array(5).fill().map(() => ({ obmocje: '', drugo: '' })),
    
    selectedDelavci: {}, selectedVozila: {}, priorityStroji: {}, selectedStroji: {}, selectedMateriali: {}, selectedOdpadki: {},
    slike: [], opombe: '', podpisOdgovornega: '', podpisDrugo: ''
};

function App() {
    const loadState = () => { const saved = localStorage.getItem('dn_flora_state_v11_9'); return saved ? JSON.parse(saved) : INITIAL_STATE; };
    const [formData, setFormData] = useState(loadState);
    const [status, setStatus] = useState({ type: '', text: '' });
    const [loading, setLoading] = useState(false);
    const [validationErrors, setValidationErrors] = useState([]);
    const datePickerRef = useRef(null);

    useEffect(() => { localStorage.setItem('dn_flora_state_v11_9', JSON.stringify(formData)); }, [formData]);

    useEffect(() => {
        if (datePickerRef.current) {
            datePickerRef.current._flatpickr = flatpickr(datePickerRef.current, { locale: 'sl', dateFormat: 'Y-m-d', defaultDate: formData.datum, onChange: (d, str) => updateField('datum', str) });
        }
    }, []);

    const resetForm = () => {
        setFormData(INITIAL_STATE);
        setValidationErrors([]);
        if (datePickerRef.current && datePickerRef.current._flatpickr) {
            datePickerRef.current._flatpickr.clear();
        }
        window.scrollTo(0,0);
    };

    const updateField = (field, val) => { setFormData(p => ({ ...p, [field]: val })); if(validationErrors.length) setValidationErrors([]); };
    
    const handleToggle = (category, name, defaultData) => {
        setFormData(p => {
            const newCat = { ...p[category] };
            if (newCat[name]) delete newCat[name]; 
            else newCat[name] = defaultData;
            return { ...p, [category]: newCat };
        });
        if(validationErrors.length) setValidationErrors([]);
    };

    const handleUpdate = (category, name, field, val) => {
        setFormData(p => {
            const newCat = { ...p[category] };
            if(newCat[name]) newCat[name] = { ...newCat[name], [field]: val };
            
            if (category === 'selectedDelavci' && (field === 'ure' || field === 'minute')) {
                const keys = Object.keys(newCat);
                if (keys.length > 1 && name === keys[0]) {
                    keys.forEach(k => {
                        if (k !== name) newCat[k][field] = val;
                    });
                }
            }
            return { ...p, [category]: newCat };
        });
        if(validationErrors.length) setValidationErrors([]);
    };

    const updateLocArray = (arr, idx, key, val) => {
        setFormData(p => {
            const newArr = [...p[arr]];
            newArr[idx] = { ...newArr[idx], [key]: val };
            return { ...p, [arr]: newArr };
        });
        if(validationErrors.length) setValidationErrors([]);
    };

    const getPriorityStroji = () => {
        let key = Object.keys(STORITVE_STROJI).find(k => formData.storitev.startsWith(k));
        return key ? STORITVE_STROJI[key] : ['Ročni pihalnik'];
    };

    const validate = () => {
        const errs = [];
        if (!formData.narocnik) errs.push('Naročnik je obvezen.');
        if (!formData.datum) errs.push('Datum je obvezen.');
        if (!formData.storitev) errs.push('Storitev je obvezna.');
        
        const isMok34or35 = formData.storitev.includes('mok34') || formData.storitev.includes('mok35');
        const hasKoncano = formData.obmocjeKoncano.some(o => o.obmocje && (o.obmocje !== 'Drugo' || o.drugo));
        const hasNedokoncano = formData.obmocjeNedokoncano.some(o => o.obmocje && (o.obmocje !== 'Drugo' || o.drugo));
        
        if (!hasKoncano && !hasNedokoncano && !isMok34or35) {
            errs.push('Lokacija dela je obvezna.');
        }

        const delavciKeys = Object.keys(formData.selectedDelavci);
        if (delavciKeys.length === 0) errs.push('Prisotni delavci so obvezni (izberi vsaj enega).');
        
        delavciKeys.forEach(name => {
            const d = formData.selectedDelavci[name];
            if (!d.ure && !d.minute) errs.push(`Delavec (${name}): Vpiši ure ali minute!`);
            if (name === 'Drugo' && !d.drugoIme) errs.push(`Delavec (Drugo): Vpiši ime!`);
        });

        Object.entries(formData.selectedVozila).forEach(([name, d]) => {
            if (!d.km) errs.push(`Vozilo (${name}): Vpiši kilometre!`);
            if (name === 'Drugo' && !d.drugoIme) errs.push(`Vozilo (Drugo): Vpiši registrsko!`);
        });
        Object.entries(formData.selectedStroji).forEach(([name, d]) => {
            if (!d.ure && !d.minute) errs.push(`Ostali Stroj (${name}): Vpiši čas uporabe!`);
            if (name === 'Drugo' && !d.drugoIme) errs.push(`Stroj (Drugo): Vpiši naziv!`);
        });
        Object.entries(formData.selectedMateriali).forEach(([name, d]) => {
            if (!d.kolicina) errs.push(`Material (${name}): Vpiši količino!`);
            if (name === 'Drugo' && !d.drugoIme) errs.push(`Material (Drugo): Vpiši naziv!`);
            if (name === 'Drugo' && !d.enota) errs.push(`Material (Drugo): Vpiši enoto!`);
        });
        Object.entries(formData.selectedOdpadki).forEach(([name, d]) => {
            if (!d.kolicina) errs.push(`Odpadek (${name}): Vpiši količino!`);
            if (name === 'Drugo' && !d.drugoIme) errs.push(`Odpadek (Drugo): Vpiši vrsto!`);
            if (name === 'Drugo' && !d.enota) errs.push(`Odpadek (Drugo): Vpiši enoto!`);
        });
        
        if (!formData.podpisOdgovornega) errs.push('Podpis odgovornega delavca je obvezen.');
        else if (formData.podpisOdgovornega === 'Drugo' && !formData.podpisDrugo) errs.push('Podpis odgovornega: Vpiši ime in priimek.');

        return errs;
    };

    const handleImageUpload = async (e) => {
        const files = Array.from(e.target.files);
        if (formData.slike.length + files.length > 5) return alert('Največ 5 slik!');
        setLoading(true);
        for (const file of files) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image(); img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    if (w > 800 || h > 800) { if (w > h) { h = Math.round(h * (800 / w)); w = 800; } else { w = Math.round(w * (800 / h)); h = 800; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    setFormData(p => ({ ...p, slike: [...p.slike, { data: canvas.toDataURL('image/jpeg', 0.6), name: file.name }] }));
                }
            }
        }
        setLoading(false); e.target.value = '';
    };

    const handleSubmit = async () => {
        const errors = validate(); setValidationErrors(errors);
        if (errors.length) { setStatus({ type: 'error', text: 'Odpravite napake označene z rdečo.' }); window.scrollTo({ top: 0, behavior: 'smooth' }); return; }

        setLoading(true); setStatus({ type: 'info', text: 'Pošiljam podatke...' });

        const formatNum = (num) => num ? num.toString().replace(/\./g, ',') : '';
        const timeToDec = (h, m) => {
            const dec = parseFloat(h||0) + parseFloat(m||0)/60;
            return dec === 0 ? '' : dec.toFixed(2).replace('.', ',');
        };

        const payload = {
            imeNaloga: `${formData.datum} ${formData.storitev.split(' ')[0]}`,
            narocnik: formData.narocnik === 'Drugo' ? formData.narocnikDrugo : formData.narocnik,
            datum: formData.datum,
            storitev: formData.storitev === 'Drugo' || formData.storitev.includes('Nepredvidena') ? (formData.storitevDrugo || formData.storitev) : formData.storitev,
            obmocjeKoncano: formData.obmocjeKoncano.map(o => o.obmocje === 'Drugo' ? o.drugo : o.obmocje).filter(Boolean).join(', '),
            obmocjeNedokoncano: formData.obmocjeNedokoncano.map(o => o.obmocje === 'Drugo' ? o.drugo : o.obmocje).filter(Boolean).join(', '),
            opombe: formData.opombe,
            podpis: formData.podpisOdgovornega === 'Drugo' ? formData.podpisDrugo : formData.podpisOdgovornega,
            
            storitevKolicina: formData.storitevKolicina || '',
            parki: formData.storitevParki.join('||'),
            kosi: formData.storitevPasjiKosi.join('||')
        };
        
        const visLabels = ['do 5m', '5-10m', '10-15m', 'nad 15m'];
        payload.visine = formData.storitevVisine.map((v, i) => v.selected ? `${formatNum(v.kolicina || 0)}x ${visLabels[i]}` : null).filter(Boolean).join('||');

        let dIdx = 1; Object.entries(formData.selectedDelavci).forEach(([n, d]) => {
            if(dIdx>15) return; payload[`delavec${dIdx}`] = n==='Drugo'?d.drugoIme:n; payload[`delavec${dIdx}Ure`] = timeToDec(d.ure, d.minute); payload[`delavec${dIdx}Enota`] = 'ur'; dIdx++;
        });

        let vIdx = 1; Object.entries(formData.selectedVozila).forEach(([n, d]) => {
            if(vIdx>5) return; payload[`vozilo${vIdx}`] = n==='Drugo'?d.drugoIme:n; payload[`vozilo${vIdx}Km`] = formatNum(d.km); payload[`vozilo${vIdx}Enota`] = 'km'; vIdx++;
        });

        let sIdx = 1; 
        getPriorityStroji().forEach(s => { const d = formData.priorityStroji[s]; if (d && (d.ure || d.minute)) { payload[`stroj${sIdx}`] = s; payload[`stroj${sIdx}Ure`] = timeToDec(d.ure, d.minute); payload[`stroj${sIdx}Enota`] = 'ur'; sIdx++; } });
        Object.entries(formData.selectedStroji).forEach(([n, d]) => {
            if(sIdx>10) return; payload[`stroj${sIdx}`] = n==='Drugo'?d.drugoIme:n; payload[`stroj${sIdx}Ure`] = timeToDec(d.ure, d.minute); payload[`stroj${sIdx}Enota`] = 'ur'; sIdx++;
        });

        let mIdx = 1; Object.entries(formData.selectedMateriali).forEach(([n, d]) => {
            if(mIdx>5) return; let nm = n==='Drugo'?d.drugoIme:n; if(d.vrsta) nm+=` ${d.vrsta}`; payload[`material${mIdx}`] = nm; payload[`material${mIdx}Kolicina`] = formatNum(d.kolicina); payload[`material${mIdx}Enota`] = d.enota; mIdx++;
        });

        let oIdx = 1; Object.entries(formData.selectedOdpadki).forEach(([n, d]) => {
            if(oIdx>2) return; payload[`odpadki${oIdx}`] = n==='Drugo'?d.drugoIme:n; payload[`odpadki${oIdx}Kolicina`] = formatNum(d.kolicina); payload[`odpadki${oIdx}Enota`] = d.enota; oIdx++;
        });

        if (formData.slike.length) {
            payload.slikeCount = formData.slike.length;
            formData.slike.forEach((img, i) => { payload[`slika${i+1}Name`] = img.name; payload[`slika${i+1}Data`] = img.data; });
        }

        try {
            const form = document.createElement('form'); form.method = 'POST'; form.action = GOOGLE_SHEETS_API_URL; form.target = 'hidden-iframe';
            Object.entries(payload).forEach(([key, val]) => { const i = document.createElement('input'); i.type = 'hidden'; i.name = key; i.value = val || ''; form.appendChild(i); });
            if (!document.getElementById('hidden-iframe')) { const ifr = document.createElement('iframe'); ifr.id = 'hidden-iframe'; ifr.name = 'hidden-iframe'; ifr.style.display = 'none'; document.body.appendChild(ifr); }
            document.body.appendChild(form); form.submit(); document.body.removeChild(form);

            setTimeout(() => {
                setLoading(false); setStatus({ type: 'success', text: '✅ Uspešno poslano v sistem!' });
                localStorage.removeItem('dn_flora_state_v11_9'); 
                
                setTimeout(() => { 
                    if(confirm('Nalog je shranjen! Želiš začeti znova?')) { 
                        resetForm(); 
                        setStatus({ type: '', text: '' }); 
                    } 
                }, 500);
            }, 3000);
        } catch (e) { setLoading(false); setStatus({ type: 'error', text: 'Napaka: ' + e.message }); }
    };

    const isLocationRequired = !formData.storitev.includes('mok34') && !formData.storitev.includes('mok35');

    return (
        <div className="container">
            <div className="header"><h1>Delovni nalog</h1><p>FLORA & SPORT d.o.o.</p></div>
            
            <datalist id="ulice-list">
                {ULICE.map(ulica => <option key={ulica} value={ulica} />)}
            </datalist>

            {validationErrors.length > 0 && (
                <div className="error-summary fade-in">
                    <strong>⚠️ Prosim dopolnite manjkajoče podatke:</strong>
                    <ul style={{margin:'10px 0 0 20px', padding:0}}>{validationErrors.map((e, i) => <li key={i}>{e}</li>)}</ul>
                </div>
            )}

            {/* 0. OSNOVNI PODATKI */}
            <div className="card">
                <div className="section-title"><Icon name="doc" /> Osnovni podatki</div>
                <div style={{marginBottom: 16}}>
                    <label>Naročnik <span style={{color: 'var(--danger)'}}>*</span></label>
                    <select value={formData.narocnik} onChange={e => updateField('narocnik', e.target.value)} className={!formData.narocnik && validationErrors.length ? 'error' : ''}>
                        <option value="">Izberi naročnika...</option>
                        {LISTS.narocniki.map(n => <option key={n} value={n}>{n}</option>)}
                    </select>
                    {formData.narocnik === 'Drugo' && <input className={`mt-2 fade-in ${!formData.narocnikDrugo && validationErrors.length ? 'error' : ''}`} placeholder="Vpiši naročnika" value={formData.narocnikDrugo} onChange={e => updateField('narocnikDrugo', e.target.value)} style={{marginTop:12}}/>}
                </div>
                <div className="grid-2" style={{marginBottom: 16}}>
                    <div><label>Datum <span style={{color: 'var(--danger)'}}>*</span></label><input ref={datePickerRef} placeholder="Izberi datum..." readOnly className={!formData.datum && validationErrors.length ? 'error' : ''} /></div>
                    <div>
                        <label>Storitev <span style={{color: 'var(--danger)'}}>*</span></label>
                        <select value={formData.storitev} onChange={e => { updateField('storitev', e.target.value); updateField('priorityStroji', {}); }} className={!formData.storitev && validationErrors.length ? 'error' : ''}>
                            <option value="">Izberi storitev...</option>
                            {LISTS.storitve.map(s => <option key={s} value={s}>{s}</option>)}
                        </select>
                    </div>
                </div>
                {formData.storitev === 'Drugo' && <div className="fade-in" style={{marginBottom: 16}}><label>Vpiši storitev</label><input value={formData.storitevDrugo} onChange={e => updateField('storitevDrugo', e.target.value)} placeholder="Opis..." className={!formData.storitevDrugo && validationErrors.length ? 'error' : ''} /></div>}
                
                {/* VIŠINE DREVES */}
                {(formData.storitev.includes('Obrez') || formData.storitev.includes('Posek') || formData.storitev.includes('Odščip')) && (
                    <div className="fade-in priority-box" style={{marginBottom: 20}}>
                        <label style={{color: '#166534', marginBottom: 16}}>Višine dreves in količina (kos)</label>
                        <div className="checkbox-group">
                            {['do 5m', '5-10m', '10-15m', 'nad 15m'].map((label, idx) => (
                                <label key={idx} className="checkbox-item" style={{border: '1.5px solid var(--gray-200)', borderRadius: '12px', display: 'flex', alignItems: 'center', background: 'white'}}>
                                    <input type="checkbox" checked={formData.storitevVisine[idx].selected}
                                           onChange={() => {
                                               const newV = [...formData.storitevVisine];
                                               newV[idx].selected = !newV[idx].selected;
                                               if(!newV[idx].selected) newV[idx].kolicina = '';
                                               updateField('storitevVisine', newV);
                                           }} />
                                    <span style={{flex:1, fontWeight: 500}}>{label}</span>
                                    {formData.storitevVisine[idx].selected &&
                                        <input type="number" placeholder="Količina" style={{width: 90, padding: '8px 12px', margin: 0}}
                                               value={formData.storitevVisine[idx].kolicina}
                                               onClick={e => e.preventDefault()}
                                               onChange={(e) => {
                                                    const newV = [...formData.storitevVisine];
                                                    newV[idx].kolicina = e.target.value;
                                                    updateField('storitevVisine', newV);
                                               }} />
                                    }
                                </label>
                            ))}
                        </div>
                    </div>
                )}

                {formData.storitev.includes('Vzdrževanje čistoče') && (
                    <div className="fade-in" style={{marginBottom: 20}}>
                        <label>Izbrani parki (lahko označiš več)</label>
                        <div className="checkbox-group" style={{display: 'flex', flexDirection: 'column'}}>
                            {['mok35a Prešernov gaj', 'mok35b Park slovenske himne', 'mok35c Igrišče Krtek', 'mok35d Igrišče Savica', 'mok35e Bleiweisov park'].map(park => (
                                <label key={park} className="checkbox-item" style={{border: '1.5px solid var(--gray-200)', borderRadius: '12px', width: '100%'}}>
                                    <input type="checkbox" checked={formData.storitevParki.includes(park)} onChange={(e) => { const c = formData.storitevParki||[]; if(e.target.checked) updateField('storitevParki', [...c, park]); else updateField('storitevParki', c.filter(p=>p!==park)); }} />
                                    <span>{park}</span>
                                </label>
                            ))}
                        </div>
                    </div>
                )}
                {formData.storitev.includes('Čiščenje pasjih košev') && (
                    <div className="fade-in" style={{marginBottom: 20}}>
                        <label>Vrsta košev</label>
                        <div className="checkbox-group" style={{display: 'flex', flexDirection: 'column'}}>
                            {['mok34a Čiščenje na 7 dni', 'mok34b Čiščenje na 14 dni'].map(kos => (
                                <label key={kos} className="checkbox-item" style={{border: '1.5px solid var(--gray-200)', borderRadius: '12px', width: '100%'}}>
                                    <input type="radio" name="kosi" checked={formData.storitevPasjiKosi.includes(kos)} onChange={(e) => { if(e.target.checked) updateField('storitevPasjiKosi', [kos]); }} />
                                    <span>{kos}</span>
                                </label>
                            ))}
                        </div>
                    </div>
                )}
                <div style={{marginBottom: 8}}><label>Dodatna količina / Opis</label><input type="text" value={formData.storitevKolicina} onChange={e => updateField('storitevKolicina', e.target.value)} placeholder="npr. 50 m2 ali posebnosti" /></div>
            </div>

            {/* 1. LOKACIJA */}
            <div className="card">
                <div className="section-title">
                    <Icon name="location" /> Lokacija dela 
                    {isLocationRequired && <span style={{color: 'var(--danger)', marginLeft: '4px'}}>*</span>}
                </div>
                <div className="grid-2">
                    <div>
                        <label style={{color: '#16a34a'}}>Končano</label>
                        {formData.obmocjeKoncano.map((item, idx) => (
                            (idx === 0 || formData.obmocjeKoncano[idx-1].obmocje) && (
                                <div key={idx} className={idx > 0 ? "fade-in" : ""} style={{marginBottom: 12}}>
                                    <select value={item.obmocje} onChange={e => updateLocArray('obmocjeKoncano', idx, 'obmocje', e.target.value)}>
                                        <option value="">Izberi...</option>{LISTS.obmocja.map(o => <option key={o} value={o}>{o}</option>)}
                                    </select>
                                    {item.obmocje === 'Drugo' && <input list="ulice-list" placeholder="Začni tipkati ulico..." value={item.drugo} onChange={e => updateLocArray('obmocjeKoncano', idx, 'drugo', e.target.value)} style={{marginTop: 8}} className={isLocationRequired && !item.drugo && validationErrors.length ? 'error' : ''} />}
                                </div>
                            )
                        ))}
                    </div>
                    <div>
                        <label style={{color: '#ea580c'}}>Nedokončano</label>
                        {formData.obmocjeNedokoncano.map((item, idx) => (
                            (idx === 0 || formData.obmocjeNedokoncano[idx-1].obmocje) && (
                                <div key={idx} className={idx > 0 ? "fade-in" : ""} style={{marginBottom: 12}}>
                                    <select value={item.obmocje} onChange={e => updateLocArray('obmocjeNedokoncano', idx, 'obmocje', e.target.value)}>
                                        <option value="">Izberi...</option>{LISTS.obmocja.map(o => <option key={o} value={o}>{o}</option>)}
                                    </select>
                                    {item.obmocje === 'Drugo' && <input list="ulice-list" placeholder="Začni tipkati ulico..." value={item.drugo} onChange={e => updateLocArray('obmocjeNedokoncano', idx, 'drugo', e.target.value)} style={{marginTop: 8}} className={isLocationRequired && !item.drugo && validationErrors.length ? 'error' : ''} />}
                                </div>
                            )
                        ))}
                    </div>
                </div>
            </div>

            {/* 2. DELAVCI */}
            <div className="card">
                <div className="section-title"><Icon name="users" /> 1. Prisotni delavci <span style={{color: 'var(--danger)', marginLeft: '4px'}}>*</span></div>
                
                <MultiSelectDropdown title="Izberi delavce (klikni)..." options={LISTS.delavci} selectedData={formData.selectedDelavci} onToggle={n => handleToggle('selectedDelavci', n, {ure:'', minute:'', drugoIme:''})} hasError={Object.keys(formData.selectedDelavci).length === 0 && validationErrors.length > 0} />
                
                {Object.entries(formData.selectedDelavci).map(([name, data]) => (
                    <div key={name} className="fade-in" style={{display:'flex', gap: 12, marginBottom: 12, alignItems: 'center'}}>
                        <div style={{flex: 1, fontWeight: 500}}>
                            {name === 'Drugo' ? <input placeholder="Vpiši ime..." value={data.drugoIme} onChange={e => handleUpdate('selectedDelavci', name, 'drugoIme', e.target.value)} className={validationErrors.length && !data.drugoIme ? 'error' : ''} /> : name}
                        </div>
                        <div style={{width: 140}}>
                            <TimeInput ure={data.ure} minute={data.minute} onChangeUre={v => handleUpdate('selectedDelavci', name, 'ure', v)} onChangeMinute={v => handleUpdate('selectedDelavci', name, 'minute', v)} hasError={validationErrors.length && !data.ure && !data.minute} />
                        </div>
                    </div>
                ))}
            </div>

            {/* 3. VOZILA */}
            <div className="card">
                <div className="section-title"><Icon name="truck" /> 2. Potni nalog (Vozila)</div>
                
                <MultiSelectDropdown title="Izberi vozila (klikni)..." options={LISTS.vozila} selectedData={formData.selectedVozila} onToggle={n => handleToggle('selectedVozila', n, {km:'', drugoIme:''})} />

                {Object.entries(formData.selectedVozila).map(([name, data]) => (
                    <div key={name} className="fade-in grid-2" style={{marginBottom: 12, alignItems: 'center'}}>
                        <div style={{fontWeight: 500}}>
                            {name === 'Drugo' ? <input placeholder="Vpiši reg..." value={data.drugoIme} onChange={e => handleUpdate('selectedVozila', name, 'drugoIme', e.target.value)} className={validationErrors.length && !data.drugoIme ? 'error' : ''} /> : name}
                        </div>
                        <div>
                            <input type="number" placeholder="Prevoženi km" value={data.km} onChange={e => handleUpdate('selectedVozila', name, 'km', e.target.value)} className={validationErrors.length && !data.km ? 'error' : ''} />
                        </div>
                    </div>
                ))}
            </div>

            {/* 4. STROJI */}
            <div className="card">
                <div className="section-title"><Icon name="cog" /> 3. Strojno delo</div>
                
                {formData.storitev && (
                    <div className="priority-box fade-in" style={{marginBottom: 20}}>
                        <label style={{color: '#166534', marginBottom: 16}}>Priporočeni stroji za izbrano delo:</label>
                        {getPriorityStroji().map(stroj => (
                            <div key={stroj} style={{display: 'flex', justifyContent:'space-between', alignItems:'center', gap: 12, marginBottom: 12}}>
                                <span style={{fontWeight: 500}}>{stroj}</span>
                                <div style={{width: 140}}>
                                    <TimeInput 
                                        ure={formData.priorityStroji[stroj]?.ure || ''} 
                                        minute={formData.priorityStroji[stroj]?.minute || ''}
                                        onChangeUre={v => setFormData(p => ({...p, priorityStroji: {...p.priorityStroji, [stroj]: {...(p.priorityStroji[stroj] || {}), ure: v} } }))}
                                        onChangeMinute={v => setFormData(p => ({...p, priorityStroji: {...p.priorityStroji, [stroj]: {...(p.priorityStroji[stroj] || {}), minute: v} } }))}
                                    />
                                </div>
                            </div>
                        ))}
                    </div>
                )}
                
                <label style={{marginBottom: 8}}>Ostali stroji:</label>
                <MultiSelectDropdown title="Izberi ostale stroje..." options={LISTS.stroji.filter(s => !getPriorityStroji().includes(s))} selectedData={formData.selectedStroji} onToggle={n => handleToggle('selectedStroji', n, {ure:'', minute:'', drugoIme:''})} />

                {Object.entries(formData.selectedStroji).map(([name, data]) => (
                    <div key={name} className="fade-in" style={{display:'flex', gap: 12, marginBottom: 12, alignItems: 'center'}}>
                        <div style={{flex: 1, fontWeight: 500}}>
                            {name === 'Drugo' ? <input placeholder="Vpiši naziv..." value={data.drugoIme} onChange={e => handleUpdate('selectedStroji', name, 'drugoIme', e.target.value)} className={validationErrors.length && !data.drugoIme ? 'error' : ''} /> : name}
                        </div>
                        <div style={{width: 140}}>
                            <TimeInput ure={data.ure} minute={data.minute} onChangeUre={v => handleUpdate('selectedStroji', name, 'ure', v)} onChangeMinute={v => handleUpdate('selectedStroji', name, 'minute', v)} hasError={validationErrors.length && !data.ure && !data.minute} />
                        </div>
                    </div>
                ))}
            </div>

            {/* 5. MATERIALI */}
            <div className="card">
                <div className="section-title"><Icon name="box" /> 4. Poraba materiala</div>
                
                <MultiSelectDropdown title="Izberi materiale..." options={LISTS.materiali} selectedData={formData.selectedMateriali} onToggle={n => handleToggle('selectedMateriali', n, {kolicina:'', vrsta:'', drugoIme:'', enota: MATERIAL_ENOTE[n] || 'kos'})} />

                {Object.entries(formData.selectedMateriali).map(([name, data]) => (
                    <div key={name} className="fade-in" style={{marginBottom: 16, borderBottom: '1px solid var(--gray-100)', paddingBottom: 16}}>
                        <div style={{fontWeight: 600, marginBottom: 8}}>
                            {name === 'Drugo' ? <input placeholder="Vpiši naziv..." value={data.drugoIme} onChange={e => handleUpdate('selectedMateriali', name, 'drugoIme', e.target.value)} className={validationErrors.length && !data.drugoIme ? 'error' : ''} /> : name}
                        </div>
                        <div className="grid-2">
                            <input type="number" placeholder="Količina" value={data.kolicina} onChange={e => handleUpdate('selectedMateriali', name, 'kolicina', e.target.value)} className={validationErrors.length && !data.kolicina ? 'error' : ''} />
                            
                            <div className="unit-display">
                                {name === 'Drugo' ? 
                                    <input placeholder="Enota..." value={data.enota} onChange={e => handleUpdate('selectedMateriali', name, 'enota', e.target.value)} className={validationErrors.length && !data.enota ? 'error' : ''} /> 
                                    : data.enota
                                }
                            </div>
                        </div>
                        {(name === 'Gnojilo' || name === 'Travno seme') && <input placeholder="Vrsta (npr. NPK 15-15-15)" value={data.vrsta} onChange={e => handleUpdate('selectedMateriali', name, 'vrsta', e.target.value)} style={{marginTop: 8}} />}
                    </div>
                ))}
            </div>

            {/* 6. ODPADKI */}
            <div className="card">
                <div className="section-title"><Icon name="trash" /> 5. Odpadki</div>
                
                <MultiSelectDropdown title="Izberi odpadke..." options={LISTS.odpadki} selectedData={formData.selectedOdpadki} onToggle={n => handleToggle('selectedOdpadki', n, {kolicina:'', drugoIme:'', enota: ODPADKI_ENOTE[n] || 'm³'})} />

                {Object.entries(formData.selectedOdpadki).map(([name, data]) => (
                    <div key={name} className="fade-in" style={{marginBottom: 16}}>
                        <div style={{fontWeight: 600, marginBottom: 8}}>
                            {name === 'Drugo' ? <input placeholder="Vpiši vrsto..." value={data.drugoIme} onChange={e => handleUpdate('selectedOdpadki', name, 'drugoIme', e.target.value)} className={validationErrors.length && !data.drugoIme ? 'error' : ''} /> : name}
                        </div>
                        <div className="grid-2">
                            <input type="number" placeholder="Količina" value={data.kolicina} onChange={e => handleUpdate('selectedOdpadki', name, 'kolicina', e.target.value)} className={validationErrors.length && !data.kolicina ? 'error' : ''} />
                            
                            <div className="unit-display">
                                {name === 'Drugo' ? 
                                    <input placeholder="Enota..." value={data.enota} onChange={e => handleUpdate('selectedOdpadki', name, 'enota', e.target.value)} className={validationErrors.length && !data.enota ? 'error' : ''} /> 
                                    : data.enota
                                }
                            </div>
                        </div>
                    </div>
                ))}
            </div>

            {/* 7. SLIKE */}
            <div className="card">
                <div className="section-title"><Icon name="camera" /> 6. Slike s terena</div>
                <label className="upload-box">
                    <Icon name="camera" size={48} /><span>Pritisni za dodajanje slik (največ 5)</span>
                    <input type="file" multiple accept="image/*" onChange={handleImageUpload} style={{display: 'none'}} />
                </label>
                <div className="img-grid">
                    {formData.slike.map((img, i) => (
                        <div key={i} className="img-preview fade-in">
                            <img src={img.data} alt="predogled" />
                            <button className="img-remove" onClick={() => setFormData(p => ({...p, slike: p.slike.filter((_, idx) => idx !== i)}))}><Icon name="close" size={16} /></button>
                        </div>
                    ))}
                </div>
            </div>

            {/* 8. ZAKLJUČEK */}
            <div className="card">
                <div className="section-title"><Icon name="check" /> Zaključek <span style={{color: 'var(--danger)', marginLeft: '4px'}}>*</span></div>
                <div style={{marginBottom: 20}}><label>Opombe</label><textarea rows="3" value={formData.opombe} onChange={e => updateField('opombe', e.target.value)} placeholder="Težave ali opažanja..."></textarea></div>
                <div style={{marginBottom: 24}}>
                    <label>Podpis odgovornega delavca <span style={{color: 'var(--danger)'}}>*</span></label>
                    <select value={formData.podpisOdgovornega} onChange={e => updateField('podpisOdgovornega', e.target.value)} className={!formData.podpisOdgovornega && !formData.podpisDrugo && validationErrors.length ? 'error' : ''}>
                        <option value="">Izberi ime...</option>
                        {LISTS.delavci.filter(d => d !== 'Drugo').map(d => <option key={d} value={d}>{d}</option>)}
                        <option value="Drugo">Drugo</option>
                    </select>
                    {formData.podpisOdgovornega === 'Drugo' && <input placeholder="Vpiši ime in priimek" value={formData.podpisDrugo} onChange={e => updateField('podpisDrugo', e.target.value)} style={{marginTop: 12}} className={`fade-in ${!formData.podpisDrugo && validationErrors.length ? 'error' : ''}`} />}
                </div>

                {status.text && status.type === 'error' && <div className="fade-in error-summary" style={{textAlign: 'center'}}>{status.text}</div>}

                <button className="btn btn-primary" onClick={handleSubmit} disabled={loading} style={{padding: '20px', fontSize: '1.15rem'}}>
                    {loading ? '⏳ Obdelujem...' : <><Icon name="send" /> Oddaj nalog</>}
                </button>
                <button className="btn btn-secondary" disabled={loading} style={{marginTop: 24, background: 'transparent', border: 'none', color: 'var(--text-muted)'}} 
                    onClick={() => { if(confirm('Izbrišem vse vnešene podatke?')) { resetForm(); } }}>
                    <Icon name="trash" size={20} /> Izbriši in začni znova
                </button>
            </div>
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
